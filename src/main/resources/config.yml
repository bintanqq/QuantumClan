# ╔══════════════════════════════════════════════════════╗
# ║           QuantumClan - config.yml                   ║
# ║   Edit sesuai kebutuhan server.                      ║
# ║   Reload: /qclanadmin reload                         ║
# ╚══════════════════════════════════════════════════════╝

# ── Clan Creation ─────────────────────────────────────────────
clan-creation-cost: 5000.0
max-name-length: 24
max-tag-length: 8
# Durasi tunggu chat input sebelum auto-cancel (detik)
chat-input-timeout: 60

# ── Economy Provider ──────────────────────────────────────────
# Pilihan: VAULT | PLAYERPOINTS | COINS
economy-provider: VAULT

# ── Chat Tag ──────────────────────────────────────────────────
# Plugin ini TIDAK mengubah format chat secara keseluruhan.
# Hanya menambahkan tag clan sebagai prefix atau suffix
# di depan/belakang nama player di chat.
# Kompatibel dengan EssentialsChat, LuckPerms prefix, dll.
chat:
  # Aktifkan/nonaktifkan tampilan tag clan di chat
  tag-enabled: true

  # PREFIX = tag tampil DI DEPAN nama player
  # SUFFIX = tag tampil DI BELAKANG nama player
  tag-position: PREFIX

  # Format tag yang ditampilkan. {tag} = colored tag clan
  # Contoh PREFIX: "<gray>[{tag}<gray>] "  → [NWF] Steve: halo
  # Contoh SUFFIX: " <gray>[{tag}<gray>]"  → Steve [NWF]: halo
  tag-format: "<gray>[{tag}<gray>] "

# ── Teleport & Cooldown ───────────────────────────────────────
teleport-cooldown: 3
home-teleport-cooldown: 30

# ── Bounty ────────────────────────────────────────────────────
bounty-expire-hours: 48
bounty-min-amount: 100.0

# ── Clan Hall ─────────────────────────────────────────────────
clan-hall:
  enabled: false
  # AUTO deteksi FAWE dulu, fallback NBT; paksa: NBT atau FAWE
  engine: AUTO

# ── Leaderboard Cache ─────────────────────────────────────────
leaderboard-cache-interval: 6000
leaderboard-size: 50

# ── Reputation Weights ────────────────────────────────────────
reputation-weights:
  bounty-complete: 5
  war-win: 20

# ── Contribution Weights ──────────────────────────────────────
contribution-weights:
  deposit-per-thousand: 1
  bounty-complete: 10
  war-win: 25

# ── Hologram ──────────────────────────────────────────────────
hologram:
  update-interval: 6000
  location:
    world: "world"
    x: 0.0
    y: 64.0
    z: 0.0

# ── XP Boost ──────────────────────────────────────────────────
xp-boost-multiplier: 2.0

# ── Death Protection ──────────────────────────────────────────
death-protection-cooldown: 3600

# ── Spy Scroll ────────────────────────────────────────────────
spy-scroll-duration: 300
spy-scroll-update-interval: 60

# ── Clan Announcement ─────────────────────────────────────────
announce-cooldown: 3600

# ── Level Requirements ────────────────────────────────────────
level-requirements:
  - level: 1
    cost: 0
    max-members: 10
    max-homes: 1
  - level: 2
    cost: 10000
    max-members: 15
    max-homes: 2
  - level: 3
    cost: 25000
    max-members: 20
    max-homes: 3
  - level: 4
    cost: 50000
    max-members: 25
    max-homes: 4
  - level: 5
    cost: 100000
    max-members: 35
    max-homes: 5
  - level: 6
    cost: 200000
    max-members: 45
    max-homes: 6
  - level: 7
    cost: 350000
    max-members: 60
    max-homes: 8
  - level: 8
    cost: 500000
    max-members: 80
    max-homes: 10
  - level: 9
    cost: 750000
    max-members: 100
    max-homes: 12
  - level: 10
    cost: 1000000
    max-members: 150
    max-homes: 15

max-level: 10