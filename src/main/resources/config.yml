# ╔══════════════════════════════════════════════════════╗
# ║           QuantumClan - config.yml                   ║
# ║   Reload: /qclanadmin reload                         ║
# ╚══════════════════════════════════════════════════════╝

# DO NOT CHANGE IF YOU DONT UNDERSTAND
config-version: 1

# ── Database ──────────────────────────────────────────────────
database:
  # SQLITE (default, zero-config) or MYSQL (requires credentials below)
  type: SQLITE

  sqlite:
    file: quantumclan.db

  mysql:
    host: localhost
    port: 3306
    database: quantumclan
    username: root
    password: ""
    pool-size: 10
    connection-timeout: 30000
    properties:
      useSSL: false
      autoReconnect: true
      characterEncoding: utf8mb4

# ── Clan Creation ─────────────────────────────────────────────
clan-creation-cost: 5000.0
max-name-length: 24
max-tag-length: 8
# Seconds before chat input auto-cancels
chat-input-timeout: 60

# ── Economy Provider ──────────────────────────────────────────
# Options: VAULT | PLAYERPOINTS | COINS
economy-provider: VAULT

# ── Coins (Built-in secondary currency) ───────────────────────
coins-name: "Coins"

# ── Feature Toggles ───────────────────────────────────────────
features:
  announcements: true
  bounties: true
  wars: true
  leveling: true
  homes: true
  clan-shop: true
  contributions: true
  coins-shop: true
  clan-hall: false
  xp-boost: true
  spy-scroll: true
  death-protection: true
  clan-shield: true
  reputation: true
  vault: true

# ── Chat Tag ──────────────────────────────────────────────────
chat:
  tag-enabled: true
  tag-position: PREFIX
  tag-format: "<gray>[{tag}<gray>] "

# ── Cooldowns ─────────────────────────────────────────────────
teleport-cooldown: 3
home-teleport-cooldown: 30
announce-cooldown: 3600
death-protection-cooldown: 3600

# ── Bounty ────────────────────────────────────────────────────
bounty-expire-hours: 48
bounty-min-amount: 100.0

# ── Clan Hall ─────────────────────────────────────────────────
clan-hall:
  enabled: false
  engine: AUTO

# ── Disband ───────────────────────────────────────────────────
disband:
  refund-treasury: true
  refund-creation-cost: false

# ── Leaderboard Cache ─────────────────────────────────────────
leaderboard-cache-interval: 6000
leaderboard-size: 50

# ── Reputation Weights ────────────────────────────────────────
reputation-weights:
  bounty-complete: 5
  war-win: 20

# ── Contribution Weights ──────────────────────────────────────
contribution-weights:
  deposit-per-unit: 1
  deposit-amount-unit: 1000
  bounty-complete: 10
  war-win: 25

# ── XP Boost ──────────────────────────────────────────────────
xp-boost-multiplier: 2.0

# ── Spy Scroll ────────────────────────────────────────────────
spy-scroll-duration: 300
spy-scroll-update-interval: 60

# ── Level Requirements ────────────────────────────────────────
level-requirements:
  - level: 1
    cost: 0
    max-members: 10
    max-homes: 1
    vault-rows: 1
  - level: 2
    cost: 10000
    max-members: 15
    max-homes: 2
    vault-rows: 1
  - level: 3
    cost: 25000
    max-members: 20
    max-homes: 3
    vault-rows: 2
  - level: 4
    cost: 50000
    max-members: 25
    max-homes: 4
    vault-rows: 2
  - level: 5
    cost: 100000
    max-members: 35
    max-homes: 5
    vault-rows: 3
  - level: 6
    cost: 200000
    max-members: 45
    max-homes: 6
    vault-rows: 3
  - level: 7
    cost: 350000
    max-members: 60
    max-homes: 8
    vault-rows: 4
  - level: 8
    cost: 500000
    max-members: 80
    max-homes: 10
    vault-rows: 5
  - level: 9
    cost: 750000
    max-members: 100
    max-homes: 12
    vault-rows: 5
  - level: 10
    cost: 1000000
    max-members: 150
    max-homes: 15
    vault-rows: 6

max-level: 10