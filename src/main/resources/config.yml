# ╔══════════════════════════════════════════════════════╗
# ║           QuantumClan - config.yml                   ║
# ║   Reload: /qclanadmin reload                         ║
# ╚══════════════════════════════════════════════════════╝

# DO NOT CHANGE IF YOU DONT UNDERSTAND
config-version: 1

# ── Clan Creation ─────────────────────────────────────────────
clan-creation-cost: 5000.0
max-name-length: 24
max-tag-length: 8
# Seconds before chat input auto-cancels
chat-input-timeout: 60

# ── Economy Provider ──────────────────────────────────────────
# Options: VAULT | PLAYERPOINTS | COINS
economy-provider: VAULT

# ── Coins (Built-in secondary currency) ───────────────────────
# Customizable display name for the built-in coin currency
coins-name: "Coins"

# ── Feature Toggles ───────────────────────────────────────────
# Enable or disable specific features entirely
features:
  # Clan announcement system (/qclan announce)
  announcements: true
  # Bounty system (/qclan bounty)
  bounties: true
  # Clan war system (/qclan war)
  wars: true
  # Clan leveling/upgrade system (/qclan upgrade)
  leveling: true
  # Clan homes (/qclan home, sethome, delhome)
  homes: true
  # Clan shop (/qclan shop)
  clan-shop: true
  # Contribution points and shop (/qclan contribution)
  contributions: true
  # Coins shop (/qclan coins)
  coins-shop: true
  # Clan Hall (schematic placement)
  clan-hall: false
  # XP Boost from clan shop
  xp-boost: true
  # Spy Scroll from clan shop
  spy-scroll: true
  # Death Protection from clan shop
  death-protection: true
  # Clan Shield utility from clan shop
  clan-shield: true
  # Reputation system (tracks clan ranking)
  reputation: true

# ── Chat Tag ──────────────────────────────────────────────────
chat:
  tag-enabled: true
  # PREFIX = tag before player name | SUFFIX = tag after player name
  tag-position: PREFIX
  # {tag} = colored tag WITHOUT brackets. Add brackets in format if desired.
  # Example: "<gray>[{tag}<gray>] " → [NWF] Steve: hello
  tag-format: "<gray>[{tag}<gray>] "

# ── Cooldowns ─────────────────────────────────────────────────
teleport-cooldown: 3
home-teleport-cooldown: 30
announce-cooldown: 3600
death-protection-cooldown: 3600

# ── Bounty ────────────────────────────────────────────────────
bounty-expire-hours: 48
bounty-min-amount: 100.0

# ── Clan Hall ─────────────────────────────────────────────────
# NOTE: Each clan has its own Hall location. An admin places the schematic
# for a clan at a specific location using the schematic engine below.
# The 'features.clan-hall' toggle above must also be true.
clan-hall:
  enabled: false
  # AUTO detects FAWE first, falls back to NBT. Force: NBT or FAWE
  engine: AUTO

# ── Disband ───────────────────────────────────────────────────
disband:
  # If true, clan treasury is refunded to the leader when disbanded
  refund-treasury: true
  # If true, also refund the clan creation cost to the leader
  refund-creation-cost: false

# ── Leaderboard Cache ─────────────────────────────────────────
leaderboard-cache-interval: 6000
leaderboard-size: 50

# ── Reputation Weights ────────────────────────────────────────
reputation-weights:
  bounty-complete: 5
  war-win: 20

# ── Contribution Weights ──────────────────────────────────────
contribution-weights:
  # Points awarded per deposit-amount-unit deposited
  deposit-per-unit: 1
  # The denomination unit for deposit contribution calculation
  # e.g. 1000 = 1 point per 1000 deposited
  deposit-amount-unit: 1000
  bounty-complete: 10
  war-win: 25

# ── XP Boost ──────────────────────────────────────────────────
xp-boost-multiplier: 2.0

# ── Spy Scroll ────────────────────────────────────────────────
spy-scroll-duration: 300
spy-scroll-update-interval: 60

# ── Level Requirements ────────────────────────────────────────
level-requirements:
  - level: 1
    cost: 0
    max-members: 10
    max-homes: 1
  - level: 2
    cost: 10000
    max-members: 15
    max-homes: 2
  - level: 3
    cost: 25000
    max-members: 20
    max-homes: 3
  - level: 4
    cost: 50000
    max-members: 25
    max-homes: 4
  - level: 5
    cost: 100000
    max-members: 35
    max-homes: 5
  - level: 6
    cost: 200000
    max-members: 45
    max-homes: 6
  - level: 7
    cost: 350000
    max-members: 60
    max-homes: 8
  - level: 8
    cost: 500000
    max-members: 80
    max-homes: 10
  - level: 9
    cost: 750000
    max-members: 100
    max-homes: 12
  - level: 10
    cost: 1000000
    max-members: 150
    max-homes: 15

max-level: 10