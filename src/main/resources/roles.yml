# ╔══════════════════════════════════════════════════════╗
# ║           QuantumClan - roles.yml                    ║
# ╚══════════════════════════════════════════════════════╝
#
# Role hierarchy is based on the order here (index 0 = highest).
# Leader is always at index 0 and ALWAYS possesses all permissions.
# Add new roles between Officer and Member as needed.
#
# Available permission nodes:
#   can-kick, can-invite, can-upgrade, can-access-shop,
#   can-set-home, can-delete-home, can-deposit,
#   can-declare-bounty, can-manage-war, can-announce,
#   can-set-role, can-transfer, can-disband,
#   can-ally, can-rival
#
# true  = this role is allowed to perform the action
# false = this role is denied (will be rejected with an error message)

roles:

  - name: leader
    display-name: "<gold><bold>Leader"
    color: "#FFD700"
    # Leader always has all permissions; this list is ignored by the system
    # but is kept here for documentation purposes.
    permissions:
      can-kick: true
      can-invite: true
      can-upgrade: true
      can-access-shop: true
      can-set-home: true
      can-delete-home: true
      can-deposit: true
      can-declare-bounty: true
      can-manage-war: true
      can-announce: true
      can-set-role: true
      can-transfer: true
      can-disband: true
      can-open-vault: true
      can-deposit-vault: true
      can-withdraw-vault: true
      can-ally: true
      can-rival: true

  - name: officer
    display-name: "<aqua>Officer"
    color: "#00BFFF"
    permissions:
      can-kick: true
      can-invite: true
      can-upgrade: false
      can-access-shop: true
      can-set-home: true
      can-delete-home: true
      can-deposit: true
      can-declare-bounty: true
      can-manage-war: true
      can-announce: true
      can-set-role: false
      can-transfer: false
      can-disband: false
      can-open-vault: true
      can-deposit-vault: true
      can-withdraw-vault: true
      can-ally: true
      can-rival: true

  - name: member
    display-name: "<gray>Member"
    color: "#AAAAAA"
    permissions:
      can-kick: false
      can-invite: false
      can-upgrade: false
      can-access-shop: true
      can-set-home: false
      can-delete-home: false
      can-deposit: true
      can-declare-bounty: true
      can-manage-war: false
      can-announce: false
      can-set-role: false
      can-transfer: false
      can-disband: false
      can-open-vault: true
      can-deposit-vault: true
      can-withdraw-vault: false
      can-ally: false
      can-rival: false