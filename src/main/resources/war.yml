# ╔══════════════════════════════════════════════════════╗
# ║           QuantumClan - war.yml                      ║
# ╚══════════════════════════════════════════════════════╝

# ── Schedule ──────────────────────────────────────────────────
schedule:
  # type: DAILY | WEEKLY | MONTHLY
  type: WEEKLY
  # Start time (format HH:mm, server timezone)
  time: "20:00"
  # For WEEKLY: MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY
  day: SATURDAY
  # For MONTHLY: numbers 1-28
  day-of-month: 1

# ── War Settings ──────────────────────────────────────────────
# Format: LAST_STANDING | KILL_COUNT
format: KILL_COUNT

# War duration in minutes (for KILL_COUNT)
duration-minutes: 20

# Minimum online members required for a clan to participate
min-members-online: 3

# Maximum number of clans that can join the war (0 = unlimited)
max-clans: 0

# Registration window before the war starts (minutes)
registration-open-minutes: 60

# Countdown time after registration closes before teleportation (seconds)
countdown-seconds: 30

# ── Arena ─────────────────────────────────────────────────────
# Set via /qclanadmin war setarena
arena:
  world: "world"
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0
  # Arena radius (for WorldGuard region)
  radius: 100

# ── Reputation Reward ─────────────────────────────────────────
reputation-reward: 20

# ── Rewards ───────────────────────────────────────────────────
rewards:
  # Vault balance given to each member of the winning clan
  balance: 1000.0
  # Built-in Coins given to each member of the winning clan
  coins: 500
  # Item rewards (material + amount, received by every winning member)
  items:
    - material: DIAMOND
      amount: 3
    - material: GOLDEN_APPLE
      amount: 5

# ── Broadcast ─────────────────────────────────────────────────
# Interval for broadcasting kill counts during war (ticks, 200 = 10 seconds)
kill-broadcast-interval: 200

# War result broadcast format (MiniMessage)
broadcast:
  war-start: "<gold><bold>⚔ CLAN WAR STARTED!</bold></gold> <gray>Format: <yellow>{format}</yellow> | Duration: <yellow>{duration} mins</yellow>"
  war-end: "<gold><bold>⚔ CLAN WAR FINISHED!</bold></gold> <gray>Winner: <green><bold>{winner}</bold></green> with <yellow>{score}</yellow> points!"
  war-no-winner: "<gold><bold>⚔ CLAN WAR FINISHED!</bold></gold> <gray>No winner declared!"
  kill-count: "<dark_gray>[<gold>War</gold>]</dark_gray> <gray>Current scores: {scores}"
  registration-open: "<gold>[War]</gold> <gray>Registration is open! Use <yellow>/qclan war register</yellow> to join."
  registration-closed: "<gold>[War]</gold> <gray>Registration closed. War starts in <yellow>{seconds} seconds</yellow>!"