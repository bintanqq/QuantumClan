# ╔══════════════════════════════════════════════════════╗
# ║           QuantumClan - shop.yml                     ║
# ╚══════════════════════════════════════════════════════╝
#
# TYPE:
#   BUFF       → potion effect ke semua member clan
#   CONSUMABLE → item khusus satu kali pakai / fungsional
#   UTILITY    → upgrade permanen clan
#
# effect values: STRENGTH, SPEED, HASTE, REGENERATION, INVISIBILITY
# amplifier: 0 = level I, 1 = level II, dst.
# price: Clan Money (kas bersama)
# duration: detik (untuk BUFF)
# confirm: true = tampilkan GUI konfirmasi sebelum beli

clan-shop:

  # ── BUFF items ──────────────────────────────────────────────
  - id: buff_strength_1
    type: BUFF
    name: "<red>Clan Strength I"
    lore:
      - "<gray>Berikan efek <red>Strength I</red>"
      - "<gray>kepada seluruh member clan."
      - "<gray>Durasi: <yellow>10 menit"
      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
    material: DIAMOND_SWORD
    effect: STRENGTH
    amplifier: 0
    duration: 600
    price: 2000
    confirm: false

  - id: buff_strength_2
    type: BUFF
    name: "<red>Clan Strength II"
    lore:
      - "<gray>Berikan efek <red>Strength II</red>"
      - "<gray>kepada seluruh member clan."
