    effect: REGENERATION
    amplifier: 0
    duration: 300
    price: 3000
    confirm: false

  - id: buff_invis_1
    type: BUFF
    name: "<white>Clan Invisibility"
    lore:
      - "<gray>Berikan efek <white>Invisibility</white>"
      - "<gray>kepada seluruh member clan."
      - "<gray>Durasi: <yellow>3 menit"
      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
    material: GLASS_BOTTLE
    effect: INVISIBILITY
    amplifier: 0
    duration: 180
    price: 8000
    confirm: true

  # ── CONSUMABLE items ─────────────────────────────────────────
  - id: clan_banner
    type: CONSUMABLE
    name: "<gold>Clan Banner"
    lore:
      - "<gray>Banner resmi clan yang bisa"
      - "<gray>di-place sebagai dekorasi."
      - "<gray>Ditandai dengan tag clan."
      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
    material: WHITE_BANNER
    price: 500
    confirm: false

  - id: spy_scroll
    type: CONSUMABLE
    name: "<dark_aqua>Spy Scroll"
    lore:
      - "<gray>Reveal lokasi target player"
      - "<gray>clan lain di actionbar + compass"
      - "<gray>selama <yellow>5 menit</yellow>."
      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
    material: PAPER
    price: 3000
    confirm: true

  - id: clan_announcement
    type: CONSUMABLE
    name: "<gold>Clan Announcement"
    lore:
      - "<gray>Broadcast pesan ke seluruh server."
      - "<gray>Cooldown: <yellow>1 jam</yellow>."
      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
    material: BELL
    price: 5000
    confirm: true

  - id: death_protection
    type: CONSUMABLE
    name: "<green>Death Protection"
    lore:
      - "<gray>Keep inventory sekali pakai"
      - "<gray>saat kematian berikutnya."
      - "<gray>Cooldown: <yellow>1 jam</yellow> per player."
      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
    material: TOTEM_OF_UNDYING
    price: 10000
    confirm: true

  # ── UTILITY items ────────────────────────────────────────────
  - id: xp_boost
    type: UTILITY
    name: "<green>XP Boost"
    lore:
      - "<gray>Multiplier XP x2 untuk semua"
      - "<gray>member selama <yellow>30 menit</yellow>."
      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
    material: EXPERIENCE_BOTTLE
    duration: 1800
    price: 15000
    confirm: true

  - id: clan_shield
    type: UTILITY
    name: "<blue>Clan Shield"
    lore:
      - "<gray>Proteksi dari bounty selama"
      - "<gray><yellow>24 jam</yellow>."
      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
    material: SHIELD
    duration: 86400
    price: 20000
    confirm: true

