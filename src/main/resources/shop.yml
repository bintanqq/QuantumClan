      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
    material: GOLDEN_PICKAXE
    effect: HASTE
    amplifier: 0
    duration: 900
    price: 2000
    confirm: false

  - id: buff_haste_2
    type: BUFF
    name: "<yellow>Clan Haste II"
    lore:
      - "<gray>Berikan efek <yellow>Haste II</yellow>"
      - "<gray>kepada seluruh member clan."
      - "<gray>Durasi: <yellow>15 menit"
      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
    material: NETHERITE_PICKAXE
    effect: HASTE
    amplifier: 1
    duration: 900
    price: 5000
    confirm: true

  - id: buff_regen_1
    type: BUFF
    name: "<light_purple>Clan Regeneration I"
    lore:
      - "<gray>Berikan efek <light_purple>Regeneration I</light_purple>"
      - "<gray>kepada seluruh member clan."
      - "<gray>Durasi: <yellow>5 menit"
      - ""
      - "<gray>Harga: <gold>{price} Clan Money"
