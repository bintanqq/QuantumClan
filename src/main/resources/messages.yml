  player-not-found: "<white>Player <aqua>{player}</aqua> was not found."
  invalid-number: "<white>Please enter a valid number."
  invalid-amount: "<white>Invalid amount. Minimum is <aqua>{value}</aqua>."
  unknown-subcommand: "<white>Unknown subcommand. Type <aqua>/qclan</aqua> for help."
  cooldown: "<white>You must wait <aqua>{value}</aqua> more seconds."
