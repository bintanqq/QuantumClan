prefix: "<dark_gray>[<gold>QuantumClan</gold>]</dark_gray> "

# ── General / Error ───────────────────────────────────────────
error:
  no-permission: "<red>Kamu tidak memiliki izin untuk melakukan ini."
  player-only: "<red>Command ini hanya bisa digunakan oleh player."
  player-not-found: "<red>Player <yellow>{player}</yellow> tidak ditemukan."
  invalid-number: "<red>Masukkan angka yang valid."
  invalid-amount: "<red>Jumlah tidak valid. Minimal <yellow>{value}</yellow>."
  unknown-subcommand: "<red>Subcommand tidak dikenal. Ketik <yellow>/qclan</yellow> untuk bantuan."
  cooldown: "<red>Kamu harus menunggu <yellow>{value}</yellow> detik lagi."
  not-enough-balance: "<red>Saldo tidak mencukupi. Kamu memiliki <yellow>{value}</yellow>."
  not-enough-clan-money: "<red>Kas clan tidak mencukupi. Kas saat ini: <yellow>{value}</yellow>."
  role-no-permission: "<red>Role kamu (<yellow>{role}</yellow>) tidak diizinkan melakukan ini."
  transaction-processing: "<red>Ada transaksi yang sedang diproses. Mohon tunggu."

# ── Clan Core ─────────────────────────────────────────────────
