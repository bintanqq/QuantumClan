  kick-not-in-your-clan: "<red>Player tersebut bukan anggota clan kamu."

  leave-success: "<green>Kamu berhasil keluar dari clan <yellow>{clan}</yellow>."
  leave-broadcast: "<yellow>{player}</yellow> <red>keluar dari clan."
  leave-leader: "<red>Kamu adalah Leader! Transfer kepemilikan dulu sebelum keluar."

  disband-success: "<green>Clan <yellow>{clan}</yellow> berhasil dibubarkan."
  disband-broadcast: "<red>Clan <yellow>{clan}</yellow> telah dibubarkan."

