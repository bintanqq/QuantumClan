  upgrade-success: "<green>Clan berhasil naik ke Level <yellow>{value}</yellow>!"
  upgrade-max: "<red>Clan sudah mencapai level maksimum."
  upgrade-insufficient: "<red>Kas clan tidak mencukupi. Butuh <gold>{value}</gold> lagi."

