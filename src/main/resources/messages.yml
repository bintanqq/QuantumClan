  create-prompt-tag: "<gold>Masukkan tag clan (maks {value} karakter, contoh: NWF). Ketik <red>batal</red> untuk membatalkan."
  create-success: "<green>Clan <yellow>{clan}</yellow> <green>berhasil dibuat! Tag: <yellow>[{tag}]</yellow>"
  create-cancelled: "<gray>Pembuatan clan dibatalkan."
  create-already-in-clan: "<red>Kamu sudah bergabung di clan. Keluar dulu sebelum membuat clan baru."
  create-name-taken: "<red>Nama clan <yellow>{clan}</yellow> sudah digunakan."
  create-tag-taken: "<red>Tag <yellow>{tag}</yellow> sudah digunakan."
  create-name-invalid: "<red>Nama clan hanya boleh berisi huruf, angka, spasi, dan underscore."
  create-tag-invalid: "<red>Tag clan hanya boleh berisi huruf dan angka, tanpa spasi."
  create-insufficient-funds: "<red>Kamu membutuhkan <yellow>{value}</yellow> untuk membuat clan."
  create-timeout: "<red>Waktu input habis. Pembuatan clan dibatalkan."

  not-in-clan: "<red>Kamu belum bergabung di clan manapun."
  already-in-clan: "<red>Player <yellow>{player}</yellow> sudah bergabung di sebuah clan."
  target-not-in-clan: "<red>Player <yellow>{player}</yellow> tidak bergabung di clan manapun."
  not-found: "<red>Clan <yellow>{clan}</yellow> tidak ditemukan."

  invite-sent: "<green>Undangan dikirim ke <yellow>{player}</yellow>."
