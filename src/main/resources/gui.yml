# ── Disband Confirm GUI ───────────────────────────────────────
disband-confirm:
  title: "<dark_gray>[ <red>⚠ Disband Clan <dark_gray>]"
  size: 27
  filler: RED_STAINED_GLASS_PANE
  confirm:
    slot: 11
    material: LIME_WOOL
    name: "<green><bold>✔ CONFIRM DISBAND"
    lore:
      - "<gray>This will permanently delete"
      - "<gray>your clan and all its data."
  cancel:
    slot: 15
    material: RED_WOOL
    name: "<red><bold>✘ CANCEL"
    lore:
      - "<gray>Keep your clan."