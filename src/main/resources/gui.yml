# ── Upgrade GUI ───────────────────────────────────────────────
upgrade:
  title: "<dark_gray>[ <aqua>Upgrade Clan <dark_gray>]"
  size: 27
  filler: GRAY_STAINED_GLASS_PANE
  current:
    slot: 11
    material: EXPERIENCE_BOTTLE
    name: "<aqua>Current Level: <yellow>{level}"
  upgrade-can:
    slot: 13
    material: LIME_WOOL
    name: "<green>✔ UPGRADE"
  upgrade-cannot:
    slot: 13
    material: RED_WOOL
    name: "<red>✘ INSUFFICIENT TREASURY"
  upgrade-max:
    slot: 13
    material: BARRIER
    name: "<red>Maximum Level Reached"
  next-level:
    slot: 15
    material: BEACON
    name: "<gold>Level {level} Preview"
  close:
    slot: 22
    material: BARRIER
    name: "<red>Close"

# ── War GUI ───────────────────────────────────────────────────
war:
  title: "<dark_gray>[ <red>⚔ Clan War <dark_gray>]"
  size: 27
  filler: GRAY_STAINED_GLASS_PANE
  status:
    slot: 11
    material-no-war: CLOCK
    material-active: IRON_SWORD
    name-no-war: "<gray>No Active War"
    name-active: "<red>⚔ War Status"
  action:
    slot: 13
    material-open: GREEN_WOOL
    material-closed: BARRIER
    name-open: "<green>⚔ Register / Leave War"
    name-closed: "<gray>Registration Closed"
  clans:
    slot: 15
    material: PAPER
    name: "<white>Registered Clans ({count})"
    name-empty: "<gray>No Clans Registered"
  close:
    slot: 22
    material: BARRIER
    name: "<red>Close"

