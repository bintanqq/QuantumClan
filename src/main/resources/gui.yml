# ╔══════════════════════════════════════════════════════╗
# ║           QuantumClan - gui.yml                      ║
# ║   Configure all GUI titles and items here.           ║
# ║   Colors use MiniMessage format.                     ║
# ╚══════════════════════════════════════════════════════╝

# ── Main Menu GUI ─────────────────────────────────────────────
main-menu:
  title: "<dark_gray>[ <aqua>Clan Menu <dark_gray>]"
  size: 54
  # Filler material for border/empty slots
  filler: CYAN_STAINED_GLASS_PANE
  items:
    clan-info:
      slot: 11
      material: BOOK
      name: "<aqua>Clan Info"
      lore:
        - "<gray>View your clan information."
        - ""
        - "<white>» Left click to open"
    clan-shop:
      slot: 12
      material: GOLD_INGOT
      name: "<gold>Clan Shop"
      lore:
        - "<gray>Spend clan treasury on buffs"
        - "<gray>and consumables."
        - ""
        - "<white>» Left click to open"
    clan-home:
      slot: 13
      material: COMPASS
      name: "<green>Clan Homes"
      lore:
        - "<gray>Teleport to clan homes"
        - "<gray>or manage home locations."
        - ""
        - "<white>» Left click to open"
    clan-upgrade:
      slot: 14
      material: BEACON
      name: "<aqua>Upgrade Clan"
      lore:
        - "<gray>Spend clan treasury to"
        - "<gray>upgrade your clan level."
        - ""
        - "<white>» Left click to open"
    clan-top:
      slot: 15
      material: NETHER_STAR
      name: "<gold>Leaderboard"
      lore:
        - "<gray>View the top clans"
        - "<gray>ranked by reputation."
        - ""
        - "<white>» Left click to open"
    bounty-board:
      slot: 20
      material: SKELETON_SKULL
      name: "<red>Bounty Board"
      lore:
        - "<gray>View and manage active"
        - "<gray>bounties on players."
        - ""
        - "<white>» Left click to open"
    war-menu:
      slot: 21
      material: IRON_SWORD
      name: "<red>Clan War"
      lore:
        - "<gray>Register for clan war"
        - "<gray>or view war status."
        - ""
        - "<white>» Left click to open"
    contribution-shop:
      slot: 22
      material: EXPERIENCE_BOTTLE
      name: "<aqua>Contribution Shop"
      lore:
        - "<gray>Spend your contribution"
        - "<gray>points for personal rewards."
        - ""
        - "<white>» Left click to open"
    coins-shop:
      slot: 23
      material: SUNFLOWER
      name: "<yellow>Coins Shop"
      lore:
        - "<gray>Spend your coins on"
        - "<gray>premium items and perks."
        - ""
        - "<white>» Left click to open"
    disband:
      slot: 29
      material: BARRIER
      name: "<red>Disband Clan"
      lore:
        - "<red>⚠ This will permanently"
        - "<red>delete your clan!"
        - "<gray>Only available to the Leader."
        - ""
        - "<white>» Left click to disband"

# ── Clan Info GUI ─────────────────────────────────────────────
clan-info:
  title: "<dark_gray>[ <aqua>{clan} <dark_gray>]"
  size: 54
  filler: GRAY_STAINED_GLASS_PANE
  items:
    banner:
      slot: 4
      material: YELLOW_BANNER
    stats:
      slot: 10
      material: BOOK
      name: "<aqua>Clan Statistics"
    leader:
      slot: 12
      material: PLAYER_HEAD
    shield:
      slot: 14
      material: SHIELD
      name: "<aqua>Shield Status"
    online:
      slot: 16
      material: EMERALD
      name: "<green>Members Online"
    close:
      slot: 49
      material: BARRIER
      name: "<red>Close"
      lore: []
    prev:
      slot: 45
      material: ARROW
      name: "<white>« Previous"
    next:
      slot: 53
      material: ARROW
      name: "<white>Next »"

# ── Clan Shop GUI ─────────────────────────────────────────────
clan-shop:
  title: "<dark_gray>[ <gold>Clan Shop <dark_gray>]"
  size: 54
  filler: GRAY_STAINED_GLASS_PANE
  close:
    slot: 49
    material: BARRIER
    name: "<red>Close"
  prev:
    slot: 45
    material: ARROW
    name: "<white>« Previous"
  next:
    slot: 53
    material: ARROW
    name: "<white>Next »"
  treasury-display:
    slot: 4
    material: GOLD_INGOT
    name: "<gold>Clan Treasury: <yellow>{money}"

# ── Shop Confirm GUI ──────────────────────────────────────────
shop-confirm:
  title: "<dark_gray>[ <gold>Confirm Purchase <dark_gray>]"
  size: 27
  filler: GRAY_STAINED_GLASS_PANE
  yes:
    slot: 11
    material: LIME_WOOL
    name: "<green><bold>✔ CONFIRM"
  preview:
    slot: 13
  no:
    slot: 15
    material: RED_WOOL
    name: "<red><bold>✘ CANCEL"
    lore:
      - "<gray>Return to shop."

